version: '3.8'

networks:
  kafka-network:
    driver: bridge

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    hostname: zookeeper
    networks:
      - kafka-network
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/zookeeper_jaas.conf"
    ports:
      - "2181:2181"
    volumes:
      - ./zookeeper_jaas.conf:/etc/kafka/zookeeper_jaas.conf
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    hostname: kafka
    networks:
      - kafka-network
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"  # SASL/PLAIN
      - "9093:9093"  # SASL/SCRAM-SHA-256
      - "9094:9094"  # SASL/SCRAM-SHA-512
      - "9095:9095"  # SASL/SSL
      - "9096:9096"  # SSL (one-way)
      - "9097:9097"  # mTLS
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      
      # Múltiplos Listeners
      KAFKA_LISTENERS: PLAIN://0.0.0.0:9092,SCRAM256://0.0.0.0:9093,SCRAM512://0.0.0.0:9094,SASL_SSL://0.0.0.0:9095,SSL://0.0.0.0:9096,MTLS://0.0.0.0:9097,INTERNAL://0.0.0.0:9098
      
      KAFKA_ADVERTISED_LISTENERS: PLAIN://localhost:9092,SCRAM256://localhost:9093,SCRAM512://localhost:9094,SASL_SSL://localhost:9095,SSL://localhost:9096,MTLS://localhost:9097,INTERNAL://kafka:9098
      
      # Mapeamento de Protocolos de Segurança
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAIN:SASL_PLAINTEXT,SCRAM256:SASL_PLAINTEXT,SCRAM512:SASL_PLAINTEXT,SASL_SSL:SASL_SSL,SSL:SSL,MTLS:SSL,INTERNAL:PLAINTEXT
      
      # Mecanismos SASL Habilitados
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN,SCRAM-SHA-256,SCRAM-SHA-512
      
      # Listener interno (sem autenticação)
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      
      # Configuração SSL
      KAFKA_SSL_KEYSTORE_FILENAME: kafka.keystore.jks
      KAFKA_SSL_KEYSTORE_CREDENTIALS: keystore_creds
      KAFKA_SSL_KEY_CREDENTIALS: key_creds
      KAFKA_SSL_TRUSTSTORE_FILENAME: kafka.truststore.jks
      KAFKA_SSL_TRUSTSTORE_CREDENTIALS: truststore_creds
      KAFKA_SSL_CLIENT_AUTH: none
      
      # mTLS específico
      KAFKA_LISTENER_NAME_MTLS_SSL_CLIENT_AUTH: required
      
      # JAAS
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/kafka_jaas.conf"
      
      # Outras configs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      
    volumes:
      - ./kafka_jaas.conf:/etc/kafka/kafka_jaas.conf
      - ./certs:/etc/kafka/secrets
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9098"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    hostname: kafka-ui
    networks:
      - kafka-network
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
      
      # Cluster 1: SASL/PLAIN
      KAFKA_CLUSTERS_0_NAME: SASL-PLAIN
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: SASL_PLAINTEXT
      KAFKA_CLUSTERS_0_PROPERTIES_SASL_MECHANISM: PLAIN
      KAFKA_CLUSTERS_0_PROPERTIES_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret";'
      
      # Cluster 2: SASL/SCRAM-SHA-256
      KAFKA_CLUSTERS_1_NAME: SCRAM-SHA-256
      KAFKA_CLUSTERS_1_BOOTSTRAPSERVERS: kafka:9093
      KAFKA_CLUSTERS_1_PROPERTIES_SECURITY_PROTOCOL: SASL_PLAINTEXT
      KAFKA_CLUSTERS_1_PROPERTIES_SASL_MECHANISM: SCRAM-SHA-256
      KAFKA_CLUSTERS_1_PROPERTIES_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.scram.ScramLoginModule required username="admin" password="admin-secret";'
      
      # Cluster 3: SASL/SCRAM-SHA-512
      KAFKA_CLUSTERS_2_NAME: SCRAM-SHA-512
      KAFKA_CLUSTERS_2_BOOTSTRAPSERVERS: kafka:9094
      KAFKA_CLUSTERS_2_PROPERTIES_SECURITY_PROTOCOL: SASL_PLAINTEXT
      KAFKA_CLUSTERS_2_PROPERTIES_SASL_MECHANISM: SCRAM-SHA-512
      KAFKA_CLUSTERS_2_PROPERTIES_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.scram.ScramLoginModule required username="admin" password="admin-secret";'
      
      # Cluster 4: SASL/SSL
      KAFKA_CLUSTERS_3_NAME: SASL-SSL
      KAFKA_CLUSTERS_3_BOOTSTRAPSERVERS: kafka:9095
      KAFKA_CLUSTERS_3_PROPERTIES_SECURITY_PROTOCOL: SASL_SSL
      KAFKA_CLUSTERS_3_PROPERTIES_SASL_MECHANISM: PLAIN
      KAFKA_CLUSTERS_3_PROPERTIES_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret";'
      KAFKA_CLUSTERS_3_PROPERTIES_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/kafka.truststore.jks
      KAFKA_CLUSTERS_3_PROPERTIES_SSL_TRUSTSTORE_PASSWORD: changeit
      
      # Cluster 5: SSL (one-way)
      KAFKA_CLUSTERS_4_NAME: SSL-ONE-WAY
      KAFKA_CLUSTERS_4_BOOTSTRAPSERVERS: kafka:9096
      KAFKA_CLUSTERS_4_PROPERTIES_SECURITY_PROTOCOL: SSL
      KAFKA_CLUSTERS_4_PROPERTIES_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/kafka.truststore.jks
      KAFKA_CLUSTERS_4_PROPERTIES_SSL_TRUSTSTORE_PASSWORD: changeit
      
    volumes:
      - ./certs:/etc/kafka/secrets

volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data: